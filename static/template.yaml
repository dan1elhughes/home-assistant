- sensor:
    - name: Occupant count
      state: >
        {{ states.person | selectattr('state', 'equalto', 'home') | list | count }}

    - name: Accumulative electricity cost without standing charge
      icon: mdi:currency-gbp
      unit_of_measurement: "£"
      state: >
        {{ state_attr('sensor.octopus_energy_electricity_15p0706167_2000050773706_current_accumulative_cost', 'total_without_standing_charge') }}

    - name: Accumulative gas cost without standing charge
      icon: mdi:currency-gbp
      unit_of_measurement: "£"
      state: >
        {{ state_attr('sensor.octopus_energy_gas_g4p07003781500_7475340302_current_accumulative_cost', 'total_without_standing_charge') }}

    - name: "Solar power generation"
      device_class: power
      state_class: measurement
      unit_of_measurement: "W"
      state: >
        {% set update_threshold = now() - timedelta(minutes=5) %}
        {% if states.sensor.myenergi_myenergi_hub_power_generation.last_updated < update_threshold %}
          0
        {% else %}
          {{ states('sensor.myenergi_myenergi_hub_power_generation') }}
        {% endif %}

    - name: "Solar power generation paid"
      unit_of_measurement: "£"
      state: >
        {{ (states('sensor.myenergi_myenergi_hub_generated_today') | float * states('input_number.fit_generation_per_kwh') | float) | round(2) }}

    - name: "Export paid"
      unit_of_measurement: "£"
      state: >
        {{ (states('sensor.myenergi_myenergi_hub_grid_export_today') | float * states('sensor.octopus_energy_electricity_15p0706167_2000060833200_export_current_rate') | float) | round(2) }}

    - name: "Garden sensor temperature"
      unit_of_measurement: "°C"
      icon: mdi:thermometer
      state: >
        {{ state_attr('weather.home', 'temperature') }}

    - name: "Garden sensor humidity"
      unit_of_measurement: "%"
      icon: mdi:water-percent
      state: >
        {{ state_attr('weather.home', 'humidity') }}

    - name: "Predbat intent"
      icon: mdi:calendar-clock
      state: >
        {% set rows = (state_attr('predbat.plan_html', 'raw') or {}).get('rows', []) %}
        {% if rows and rows | length > 0 %}
          {% set r = rows[0] %}
          {% set st = r.state %}
          {% set target = r.state_target | string %}
          {% set ns = namespace(out=st) %}
          {% if target and target | trim | length > 0 %}
            {% set ns.out = st + ' → ' + target + '%' %}
          {% endif %}
          {{ ns.out }}
        {% else %}
          No plan
        {% endif %}

    - name: "Battery total power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {{
          (
            states('sensor.encharge_492452002777_power') | float(0)
            +
            states('sensor.encharge_492452002785_power') | float(0)
            +
            states('sensor.encharge_492452002787_power') | float(0)
          )
        }}

    - name: "Battery total discharge power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set p = states('sensor.battery_total_power') | float(0) %}
        {{ p if p > 0 else 0 }}

    - name: "Battery total charge power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set p = states('sensor.battery_total_power') | float(0) %}
        {{ (p * -1) if p < 0 else 0 }}

    - name: "Battery energy charged"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('input_number.battery_energy_charged_wh') | float(0)) / 1000 }}

    - name: "Battery energy discharged"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('input_number.battery_energy_discharged_wh') | float(0)) / 1000 }}

    - name: "Office AC power filtered"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% if states('climate.office_ac') in ['heat', 'cool'] %}
          {{ states('sensor.office_ac_power') }}
        {% else %}
          0
        {% endif %}

# ── Predbat power inputs ──────────────────────────────────────────────
# The Envoy can't see the car (separate circuit) and its "consumption" CT
# already nets battery charge/discharge. Predbat models the car and battery
# separately, so it needs PURE house load and TRUE grid. We derive both:
#   pure house  = envoy_consumption - battery_charge + battery_discharge
#   true grid   = myenergi hub import - export (meter-side, signed:
#                 +ve = import, -ve = export, matching Predbat's convention)
- sensor:
    - name: "Predbat house load power"
      unique_id: predbat_house_load_power
      device_class: power
      state_class: measurement
      unit_of_measurement: "W"
      availability: >
        {{ has_value('sensor.envoy_122322027694_current_power_consumption')
           and has_value('sensor.battery_total_charge_power')
           and has_value('sensor.battery_total_discharge_power') }}
      state: >
        {% set cons = states('sensor.envoy_122322027694_current_power_consumption') | float * 1000 %}
        {% set charge = states('sensor.battery_total_charge_power') | float(0) %}
        {% set discharge = states('sensor.battery_total_discharge_power') | float(0) %}
        {{ (cons - charge + discharge) | round(0) }}

    - name: "Predbat grid power"
      unique_id: predbat_grid_power
      device_class: power
      state_class: measurement
      unit_of_measurement: "W"
      availability: >
        {{ has_value('sensor.myenergi_myenergi_hub_power_import')
           and has_value('sensor.myenergi_myenergi_hub_power_export') }}
      state: >
        {# Predbat convention: grid_power +ve = import, -ve = export. The myenergi
           hub (meter-side CT, sees the whole site incl. the car) reports import
           and export as separate always-positive sensors, so we combine them
           into one signed value. Cleaner/unambiguous vs the raw Zappi grid CT. #}
        {% set imp = states('sensor.myenergi_myenergi_hub_power_import') | float(0) %}
        {% set exp = states('sensor.myenergi_myenergi_hub_power_export') | float(0) %}
        {{ (imp - exp) | round(0) }}

- binary_sensor:
    - name: One-room mode
      state: >
        {{ states('sensor.occupant_count') | int <= 1 }}

- sensor:
    - name: "Upstairs error"
      icon: mdi:alert-circle-outline
      state: >
        {% set err = states('sensor.upstairs_error_message') %}
        {{ err if err and err|trim != '' else 'OK' }}

    - name: "Downstairs error"
      icon: mdi:alert-circle-outline
      state: >
        {% set err = states('sensor.downstairs_error_message') %}
        {{ err if err and err|trim != '' else 'OK' }}
