- sensor:
    - name: Occupant count
      state: >
        {{ states.person | selectattr('state', 'equalto', 'home') | list | count }}

    - name: Accumulative electricity cost without standing charge
      icon: mdi:currency-gbp
      unit_of_measurement: "£"
      state: >
        {{ state_attr('sensor.octopus_energy_electricity_15p0706167_2000050773706_current_accumulative_cost', 'total_without_standing_charge') }}

    - name: Accumulative gas cost without standing charge
      icon: mdi:currency-gbp
      unit_of_measurement: "£"
      state: >
        {{ state_attr('sensor.octopus_energy_gas_g4p07003781500_7475340302_current_accumulative_cost', 'total_without_standing_charge') }}

    - name: "Solar power generation"
      device_class: power
      state_class: measurement
      unit_of_measurement: "W"
      state: >
        {% set update_threshold = now() - timedelta(minutes=5) %}
        {% if states.sensor.myenergi_myenergi_hub_power_generation.last_updated < update_threshold %}
          0
        {% else %}
          {{ states('sensor.myenergi_myenergi_hub_power_generation') }}
        {% endif %}

    - name: "Solar power generation paid"
      unit_of_measurement: "£"
      state: >
        {{ (states('sensor.myenergi_myenergi_hub_generated_today') | float * states('input_number.fit_generation_per_kwh') | float) | round(2) }}

    - name: "Export paid"
      unit_of_measurement: "£"
      state: >
        {{ (states('sensor.myenergi_myenergi_hub_grid_export_today') | float * states('sensor.octopus_energy_electricity_15p0706167_2000060833200_export_current_rate') | float) | round(2) }}

    - name: "Garden sensor temperature"
      unit_of_measurement: "°C"
      icon: mdi:thermometer
      state: >
        {{ state_attr('weather.home', 'temperature') }}

    - name: "Garden sensor humidity"
      unit_of_measurement: "%"
      icon: mdi:water-percent
      state: >
        {{ state_attr('weather.home', 'humidity') }}

    - name: "Current energy intent"
      icon: mdi:lightning-bolt
      state: >
        {% set events = state_attr('sensor.energy_intents', 'events') or [] %}
        {% set now_time = now() %}
        {% set ns = namespace(current_intent='Idle') %}
        {# Sort events by start time to ensure deterministic ordering #}
        {% set sorted_events = events | sort(attribute='start') %}
        {% for event in sorted_events %}
          {% if event.start and event.end %}
            {% set start_dt = as_datetime(event.start) %}
            {% set end_dt = as_datetime(event.end) %}
            {# Use strict boundary: start <= now < end to avoid overlap at boundaries #}
            {% if start_dt <= now_time < end_dt %}
              {# Charge wins over Discharge on overlap (consistent with Energy intents) #}
              {% if event.intent == 'Charge' or ns.current_intent == 'Idle' %}
                {% set ns.current_intent = event.intent %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.current_intent }}

    - name: "Next energy intent"
      icon: mdi:calendar-clock
      state: >
        {% set events = state_attr('sensor.energy_intents', 'events') or [] %}
        {% set now_time = now() %}
        {% set ns = namespace(found=false, intent='', start='', end='', is_current=false) %}

        {# Sort events by start time to ensure deterministic ordering #}
        {% set sorted_events = events | sort(attribute='start') %}

        {% for event in sorted_events %}
          {% if event.start %}
            {% set start_dt = as_datetime(event.start) %}
            {% set end_dt = as_datetime(event.end) if event.end is defined else None %}

            {# current intent #}
            {% if not ns.found and start_dt <= now_time and (end_dt is none or now_time < end_dt) %}
              {% set ns.intent = event.intent %}
              {% set ns.start = start_dt %}
              {% set ns.end = end_dt %}
              {% set ns.found = true %}
              {% set ns.is_current = true %}
            {% endif %}

            {# next intent — only look at events that start after "now" #}
            {% if not ns.found and start_dt > now_time %}
              {% set ns.intent = event.intent %}
              {% set ns.start = start_dt %}
              {% set ns.found = true %}
            {% endif %}
          {% endif %}
        {% endfor %}

        {% if ns.found %}
          {% if ns.is_current %}
            {{ ns.intent }} until {{ ns.end.strftime('%H:%M') if ns.end else '?' }}
          {% else %}
            {{ ns.intent }} at {{ ns.start.strftime('%H:%M') }}
          {% endif %}
        {% else %}
          None
        {% endif %}

    - name: "Optimal charge slots"
      icon: mdi:battery-charging
      state: "on"
      attributes:
        events: >
          {% set current_now = now().replace(second=0, microsecond=0) %}
          {% set tz = current_now.tzinfo %}
          {% set import_rates = (state_attr('event.octopus_energy_electricity_15p0706167_2000050773706_current_day_rates', 'rates') or []) + (state_attr('event.octopus_energy_electricity_15p0706167_2000050773706_next_day_rates', 'rates') or []) %}
          {% set charge_threshold = states('input_number.charge_price_threshold') | float(999) %}

          {% set ns = namespace(slots=[]) %}

          {# --- A. Import rates below threshold (raw rate) --- #}
          {% for imp_rate in import_rates %}
            {% if imp_rate.value_inc_vat < charge_threshold %}
              {% set start = as_datetime(imp_rate.start).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% set end = as_datetime(imp_rate.end).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% if end >= current_now %}
                {% set ns.slots = ns.slots + [{'start': start, 'end': end, 'intent': 'Charge', 'import_price': imp_rate.value_inc_vat}] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# --- B. Free Electricity Sessions — split any overlapping slots --- #}
          {% for cal in ['calendar.octopus_energy_a_fad3b08a_octoplus_free_electricity_session'] %}
            {% set start_raw = state_attr(cal, 'start_time') %}
            {% set end_raw = state_attr(cal, 'end_time') %}
            {% if start_raw and end_raw %}
              {% set free_start = as_datetime(start_raw).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% set free_end = as_datetime(end_raw).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% if free_end >= current_now %}
                {% set ns_new = namespace(items=[]) %}
                {% for slot in ns.slots %}
                  {% if slot.end <= free_start or slot.start >= free_end %}
                    {# No overlap — keep as-is #}
                    {% set ns_new.items = ns_new.items + [slot] %}
                  {% else %}
                    {# Overlap — split into before / after (free slot added separately) #}
                    {% if slot.start < free_start %}
                      {% set ns_new.items = ns_new.items + [{'start': slot.start, 'end': free_start, 'intent': 'Charge', 'import_price': slot.import_price}] %}
                    {% endif %}
                    {% if free_end < slot.end %}
                      {% set ns_new.items = ns_new.items + [{'start': free_end, 'end': slot.end, 'intent': 'Charge', 'import_price': slot.import_price}] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {# Add the free session itself #}
                {% set ns_new.items = ns_new.items + [{'start': free_start, 'end': free_end, 'intent': 'Charge', 'import_price': 0}] %}
                {% set ns.slots = ns_new.items %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# Merge adjacent slots with the same import price #}
          {% set ns_merged = namespace(items=[]) %}
          {% for item in ns.slots | sort(attribute='start') %}
            {% if ns_merged.items | length == 0 %}
              {% set ns_merged.items = ns_merged.items + [item] %}
            {% else %}
              {% set last = ns_merged.items[-1] %}
              {% if last.end == item.start and last.import_price == item.import_price %}
                {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': item.end, 'intent': 'Charge', 'import_price': item.import_price}] %}
              {% else %}
                {% set ns_merged.items = ns_merged.items + [item] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# Output JSON #}
          {% set ns_json = namespace(output=[]) %}
          {% for slot in ns_merged.items %}
            {% set ns_json.output = ns_json.output + [{'start': slot.start.isoformat(), 'end': slot.end.isoformat(), 'intent': slot.intent, 'import_price': slot.import_price}] %}
          {% endfor %}
          {{ ns_json.output | to_json }}

    - name: "Energy intents"
      icon: mdi:calendar
      state: "off"
      attributes:
        events: >
          {% set current_now = now().replace(second=0, microsecond=0) %}
          {% set tz = current_now.tzinfo %}

          {% set current_import = states('sensor.octopus_energy_electricity_15p0706167_2000050773706_current_rate') | float(0) %}
          {% set next_import = states('sensor.octopus_energy_electricity_15p0706167_2000050773706_next_rate') | float(0) %}
          {% set min_import_rate = [current_import, next_import] | min %}
          {% set battery_efficiency = states('input_number.battery_round_trip_efficiency') | float(0.9) %}
          {% set adjusted_min_import = min_import_rate / battery_efficiency %}

          {# ======================================================= #}
          {# 1. READ CHARGE SLOTS FROM optimal_charge_slots          #}
          {# ======================================================= #}
          {% set charge_events = state_attr('sensor.optimal_charge_slots', 'events') or [] %}
          {% set ns_charges = namespace(items=[]) %}
          {% for slot in charge_events %}
            {% set start = as_datetime(slot.start).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% set end = as_datetime(slot.end).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% set price = slot.import_price | default(none, true) %}
            {% if end >= current_now %}
              {% set ns_charges.items = ns_charges.items + [{'start': start, 'end': end, 'intent': 'Charge', 'import_price': price}] %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 2. READ DISCHARGE SLOTS FROM optimal_discharge_slots    #}
          {# ======================================================= #}
          {% set ns_discharges = namespace(items=[]) %}
          {% if states('input_boolean.allow_discharge') == 'on' %}
          {% set min_slot_length = states('input_number.minimum_slot_length') | int(0) %}
          {% set optimal_events = state_attr('sensor.optimal_discharge_slots', 'events') or [] %}
          {% for slot in optimal_events %}
            {% set start = as_datetime(slot.start).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% set end = as_datetime(slot.end).replace(tzinfo=tz, second=0, microsecond=0) %}
            {# Gate on the slot's OWN length, not remaining-from-now: a slot that was validly
               scheduled (e.g. 10:00-10:30) should stay emitted even when nearly over (10:29),
               and keep its original start so it isn't chopped/recreated every minute. #}
            {% set slot_duration = ((end - start).total_seconds() / 60) | int %}
            {% set price = slot.export_price | default(none, true) %}
            {% if end >= current_now and slot_duration >= min_slot_length %}
              {% set ns_discharges.items = ns_discharges.items + [{'start': start, 'end': end, 'intent': 'Discharge', 'export_price': price}] %}
            {% endif %}
          {% endfor %}
          {% endif %}

          {# ======================================================= #}
          {# 3. FINAL PASS: COMBINE AND TRIM (Buffer Enforcement)     #}
          {# ======================================================= #}

          {% set all_raw = ns_charges.items + ns_discharges.items %}
          {% set sorted_all = all_raw | sort(attribute='start') %}
          {% set min_slot_length = states('input_number.minimum_slot_length') | int(0) %}
          {% set ns_merged = namespace(items=[]) %}

          {% for event in sorted_all %}
            {% if ns_merged.items | length == 0 %}
              {% set ns_merged.items = ns_merged.items + [event] %}
            {% else %}
              {% set last = ns_merged.items[-1] %}

              {% if event.intent == last.intent %}
                {# -- Same Intent: Merge if touching/overlapping AND same price -- #}
                {% set same_price = (last.import_price | default(none, true) == event.import_price | default(none, true)) and (last.export_price | default(none, true) == event.export_price | default(none, true)) %}
                {% if event.start <= last.end and same_price %}
                  {% set new_end = event.end if event.end > last.end else last.end %}
                  {# When merging same-intent slots, preserve both prices #}
                  {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': new_end, 'intent': last.intent, 'import_price': last.import_price | default(none, true), 'export_price': last.export_price | default(none, true)}] %}
                {% else %}
                  {# GAP PRESERVATION: Maintain gap between non-touching same-intent events #}
                  {% set ns_merged.items = ns_merged.items + [event] %}
                {% endif %}

              {% else %}
                {# -- Different Intent: Conflict Resolution -- #}
                {% if event.start < last.end %}
                    {# Overlap #}
                      {% if event.intent == 'Charge' %}
                      {# Charge wins. Trim previous Discharge end. #}
                        {% set trimmed_last_end = event.start - timedelta(minutes=5) %}
                        {% set trimmed_duration = ((trimmed_last_end - last.start).total_seconds() / 60) | int %}
                        {% if trimmed_duration >= min_slot_length or min_slot_length == 0 %}
                            {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': trimmed_last_end, 'intent': last.intent, 'export_price': last.export_price | default(none, true)}] %}
                            {% set ns_merged.items = ns_merged.items + [event] %}
                        {% else %}
                            {% set ns_merged.items = ns_merged.items[:-1] + [event] %}
                        {% endif %}
                      {% else %}
                      {# Charge wins. Trim current Discharge start. #}
                        {% set trimmed_event_start = last.end + timedelta(minutes=5) %}
                        {% set trimmed_duration = ((event.end - trimmed_event_start).total_seconds() / 60) | int %}
                        {% if trimmed_duration >= min_slot_length or min_slot_length == 0 %}
                          {% set ns_merged.items = ns_merged.items + [{'start': trimmed_event_start, 'end': event.end, 'intent': event.intent, 'export_price': event.export_price | default(none, true)}] %}
                        {% endif %}
                      {% endif %}
                {% else %}
                    {# Gap check #}
                    {% set gap = (event.start - last.end).total_seconds() / 60 %}
                    {% if gap < 5 %}
                      {# Buffer violation #}
                        {% if event.intent == 'Charge' %}
                            {% set required_end = event.start - timedelta(minutes=5) %}
                            {% set trimmed_duration = ((required_end - last.start).total_seconds() / 60) | int %}
                            {% if trimmed_duration >= min_slot_length or min_slot_length == 0 %}
                              {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': required_end, 'intent': last.intent, 'export_price': last.export_price | default(none, true)}] %}
                              {% set ns_merged.items = ns_merged.items + [event] %}
                            {% else %}
                              {% set ns_merged.items = ns_merged.items[:-1] + [event] %}
                            {% endif %}
                        {% else %}
                            {% set required_start = last.end + timedelta(minutes=5) %}
                            {% set trimmed_duration = ((event.end - required_start).total_seconds() / 60) | int %}
                            {% if trimmed_duration >= min_slot_length or min_slot_length == 0 %}
                              {% set ns_merged.items = ns_merged.items + [{'start': required_start, 'end': event.end, 'intent': event.intent, 'export_price': event.export_price | default(none, true)}] %}
                            {% endif %}
                        {% endif %}
                    {% else %}
                      {% set ns_merged.items = ns_merged.items + [event] %}
                    {% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 4. FILTER: Never export if export price < min import price #}
          {# ======================================================= #}

          {% set ns_filtered = namespace(items=[]) %}

          {% for e in ns_merged.items %}
            {% set slot_start = e.start %}
            {% set slot_end = e.end %}

            {% if e.intent == 'Charge' %}
              {% set ns_filtered.items = ns_filtered.items + [e] %}

            {% else %}
              {# Discharge: keep only if export price is profitable (bonus already included by optimal_discharge_slots) #}
              {% set export_price = e.export_price | default(none, true) %}
              {% if export_price is not none and export_price >= adjusted_min_import %}
                {% set ns_filtered.items = ns_filtered.items + [e] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 5. OUTPUT JSON                                          #}
          {# ======================================================= #}
          {% set ns_json = namespace(output=[]) %}
          {% for e in ns_filtered.items %}
            {% if e.intent == 'Charge' and e.import_price is not none %}
              {% set ns_json.output = ns_json.output + [{'start': e.start.isoformat(), 'end': e.end.isoformat(), 'intent': e.intent, 'import_price': e.import_price}] %}
            {% elif e.intent == 'Discharge' and e.export_price is not none %}
              {% set ns_json.output = ns_json.output + [{'start': e.start.isoformat(), 'end': e.end.isoformat(), 'intent': e.intent, 'export_price': e.export_price}] %}
            {% else %}
              {% set ns_json.output = ns_json.output + [{'start': e.start.isoformat(), 'end': e.end.isoformat(), 'intent': e.intent}] %}
            {% endif %}
          {% endfor %}
          {{ ns_json.output | to_json }}

    - name: "Optimal discharge slots"
      icon: mdi:battery-charging-high
      state: "on"
      attributes:
        events: >
          {% set current_now = now().replace(second=0, microsecond=0) %}
          {% set tz = current_now.tzinfo %}

          {# Battery Parameters #}
          {% set battery_wh = states('sensor.envoy_122322027694_available_battery_energy') | float(0) %}
          {% set battery_kwh = battery_wh / 1000 %}
          {% set min_discharge_threshold_kwh = states('sensor.power_requirement_until_cheap_slot') | float(0) / 1000 %}
          {% set hard_limit_kwh = states('input_number.battery_hard_lower_limit') | float(0) / 1000 %}
          {% set discharge_rate_kw = states('input_number.battery_power_rate_kw') | float(9.6) %}

          {# Get export and import rates for the current day plus the next day (so cross-midnight windows are continuous) #}
          {% set export_rates = (state_attr('event.octopus_energy_electricity_15p0706167_2000060833200_export_current_day_rates', 'rates') or []) + (state_attr('event.octopus_energy_electricity_15p0706167_2000060833200_export_next_day_rates', 'rates') or []) %}

          {# Arbitrage check: if export is higher than import, we can discharge down to the hard limit #}
          {% set current_import = states('sensor.octopus_energy_electricity_15p0706167_2000050773706_current_rate') | float(0) %}
          {% set next_import = states('sensor.octopus_energy_electricity_15p0706167_2000050773706_next_rate') | float(0) %}
          {% set min_import_rate = [current_import, next_import] | min %}
          {% set battery_efficiency = states('input_number.battery_round_trip_efficiency') | float(0.9) %}
          {% set adjusted_min_import = min_import_rate / battery_efficiency %}

          {# Find the next charge slot to constrain discharge minutes before it #}
          {% set charge_events = state_attr('sensor.optimal_charge_slots', 'events') or [] %}
          {% set ns_next_charge = namespace(next_start=none) %}
          {% for event in charge_events %}
            {% set event_start = as_datetime(event.start).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% if event_start > current_now and ns_next_charge.next_start is none %}
              {% set ns_next_charge.next_start = event_start %}
            {% endif %}
          {% endfor %}

          {# Always use reserve-based usable_kwh, but only select profitable minutes #}
          {% set usable_kwh = [battery_kwh - min_discharge_threshold_kwh, 0] | max %}

          {# Saving session window (single current/next window, like free electricity). #}
          {# Minutes inside it are prioritised for discharge because the session pays an #}
          {# extra top-up on top of the export rate that isn't reflected in export_rates. #}
          {% set ns_saving = namespace(start=none, end=none) %}
          {% set saving_start_raw = state_attr('calendar.octopus_energy_a_fad3b08a_octoplus_saving_sessions', 'start_time') %}
          {% set saving_end_raw = state_attr('calendar.octopus_energy_a_fad3b08a_octoplus_saving_sessions', 'end_time') %}
          {% if saving_start_raw and saving_end_raw %}
            {% set saving_end = as_datetime(saving_end_raw).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% if saving_end >= current_now %}
              {% set ns_saving.start = as_datetime(saving_start_raw).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% set ns_saving.end = saving_end %}
            {% endif %}
          {% endif %}
          {# Boost applied to the sort key (not the stored export rate) so saving-session #}
          {# minutes are filled first while the real export price is preserved downstream. #}
          {% set saving_priority_boost = 10000 %}

          {# Step 1: Expand each rate period into individual minutes #}
          {# Only consider minutes before the next charge slot (so reserve protects the right window) #}
          {# Skip minutes where export rate is below the adjusted import threshold (unprofitable) #}
          {% set ns_minutes = namespace(all=[]) %}
          {% for rate in export_rates %}
            {% set rate_start = as_datetime(rate.start).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% set rate_end = as_datetime(rate.end).replace(tzinfo=tz, second=0, microsecond=0) %}
            {% set effective_end = [rate_end, ns_next_charge.next_start] | min if ns_next_charge.next_start is not none else rate_end %}
            {% if effective_end > current_now %}
              {% set current = rate_start if rate_start > current_now else current_now %}
              {% for minute in range(((effective_end - current).total_seconds() / 60) | int) %}
                {% set minute_time = current + timedelta(minutes=minute) %}
                {% set in_saving = ns_saving.start is not none and ns_saving.start <= minute_time < ns_saving.end %}
                {% set is_profitable = rate.value_inc_vat >= adjusted_min_import %}
                {% if is_profitable or in_saving %}
                  {% set ns_minutes.all = ns_minutes.all + [{
                    'time': minute_time,
                    'rate': rate.value_inc_vat,
                    'rate_start': rate_start,
                    'rate_end': rate_end,
                    'sort_rate': rate.value_inc_vat + saving_priority_boost if in_saving else rate.value_inc_vat
                  }] %}
                {% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}

          {# Step 2: Sort by priority rate (highest first), then time (latest first). #}
          {# Saving-session minutes sort to the top via sort_rate but remain tail-end-first #}
          {# within the window because the secondary time sort is preserved. #}
          {% set ns_sorted = namespace(result=[]) %}
          {% set sorted_rates = ns_minutes.all | map(attribute='sort_rate') | unique | sort(reverse=true) %}
          {% for r in sorted_rates %}
            {% set same_rate = ns_minutes.all | selectattr('sort_rate', 'equalto', r) | sort(attribute='time', reverse=true) %}
            {% set ns_sorted.result = ns_sorted.result + (same_rate | list) %}
          {% endfor %}
          {% set sorted_minutes = ns_sorted.result %}

          {# Step 3: Fill out each minute from our bucket #}
          {% set minutes_needed = ((usable_kwh / discharge_rate_kw * 60) | int) %}
          {% set filled_minutes = sorted_minutes[:minutes_needed] %}

          {# Step 4: Combine contiguous filled minutes into actual blocks #}
          {% set sorted_filled = filled_minutes | sort(attribute='time') %}
          {% set ns_blocks = namespace(blocks=[], current_start=none, current_end=none, current_rate=none) %}
          {% set ns_loop = namespace(prev_time=none) %}

          {% for minute in sorted_filled %}
            {% if ns_loop.prev_time is none %}
              {% set ns_blocks.current_start = minute.time %}
              {% set ns_blocks.current_end = minute.time + timedelta(minutes=1) %}
            {% elif (minute.time - ns_loop.prev_time).total_seconds() > 60 %}
              {# Gap detected — close current block #}
              {% set ns_blocks.blocks = ns_blocks.blocks + [{'start': ns_blocks.current_start, 'end': ns_blocks.current_end}] %}
              {% set ns_blocks.current_start = minute.time %}
              {% set ns_blocks.current_end = minute.time + timedelta(minutes=1) %}
            {% else %}
              {% set ns_blocks.current_end = minute.time + timedelta(minutes=1) %}
            {% endif %}
            {% set ns_loop.prev_time = minute.time %}
          {% endfor %}

          {# Close last block if valid #}
          {% if ns_blocks.current_start is not none %}
            {% set ns_blocks.blocks = ns_blocks.blocks + [{'start': ns_blocks.current_start, 'end': ns_blocks.current_end}] %}
          {% endif %}

          {# Saving session bonus (8 octopoints = 1p) #}
          {% set saving_sessions = state_attr('event.octopus_energy_a_fad3b08a_octoplus_saving_session_events', 'joined_events') or [] %}

          {# Calculate export price for each block using weighted average of actual minutes #}
          {% set ns_priced = namespace(items=[]) %}
          {% for block in ns_blocks.blocks %}
            {% set block_start = block.start %}
            {% set block_end = block.end %}
            {% set ns_block = namespace(total_weighted_rate=0, total_minutes=0, bonus_p=none) %}

            {# Weighted average across actual filled minutes in this block #}
            {% for minute in filled_minutes %}
              {% if block_start <= minute.time < block_end %}
                {% set ns_block.total_weighted_rate = ns_block.total_weighted_rate + minute.rate %}
                {% set ns_block.total_minutes = ns_block.total_minutes + 1 %}
              {% endif %}
            {% endfor %}

            {% set avg_rate = ns_block.total_weighted_rate / ns_block.total_minutes if ns_block.total_minutes > 0 else none %}

            {# Find saving session bonus for this block #}
            {% for session in saving_sessions %}
              {% set session_start = as_datetime(session.start).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% set session_end = as_datetime(session.end).replace(tzinfo=tz, second=0, microsecond=0) %}
              {% if session_start < block_end and session_end > block_start and session.octopoints_per_kwh is not none %}
                {% set ns_block.bonus_p = session.octopoints_per_kwh / 8 %}
              {% endif %}
            {% endfor %}

            {# Combine export rate + saving bonus into a single price (bonus_p is in pence, export_rate is in pounds) #}
            {% set combined_export = avg_rate + ((ns_block.bonus_p | default(0, true)) / 100) if avg_rate is not none else none %}
            {% set ns_priced.items = ns_priced.items + [{'start': block_start, 'end': block_end, 'intent': 'Discharge', 'export_price': combined_export}] %}
          {% endfor %}

          {# Merge adjacent slots with the same export price #}
          {% set ns_merged = namespace(items=[]) %}
          {% for item in ns_priced.items | sort(attribute='start') %}
            {% if ns_merged.items | length == 0 %}
              {% set ns_merged.items = ns_merged.items + [item] %}
            {% else %}
              {% set last = ns_merged.items[-1] %}
              {% if last.end == item.start and last.export_price == item.export_price %}
                {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': item.end, 'intent': 'Discharge', 'export_price': item.export_price}] %}
              {% else %}
                {% set ns_merged.items = ns_merged.items + [item] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# Output as JSON #}
          {% set ns_json = namespace(output=[]) %}
          {% for block in ns_merged.items %}
            {% set ns_json.output = ns_json.output + [{'start': block.start.isoformat(), 'end': block.end.isoformat(), 'intent': block.intent, 'export_price': block.export_price}] %}
          {% endfor %}
          {{ ns_json.output | to_json }}

    - name: "Battery total power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {{
          (
            states('sensor.encharge_492452002777_power') | float(0)
            +
            states('sensor.encharge_492452002785_power') | float(0)
            +
            states('sensor.encharge_492452002787_power') | float(0)
          )
        }}

    - name: "Battery total discharge power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set p = states('sensor.battery_total_power') | float(0) %}
        {{ p if p > 0 else 0 }}

    - name: "Battery total charge power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set p = states('sensor.battery_total_power') | float(0) %}
        {{ (p * -1) if p < 0 else 0 }}

    - name: "Battery energy charged"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('input_number.battery_energy_charged_wh') | float(0)) / 1000 }}

    - name: "Battery energy discharged"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('input_number.battery_energy_discharged_wh') | float(0)) / 1000 }}

    - name: "Exportable battery"
      unit_of_measurement: "Wh"
      icon: mdi:battery-arrow-up-outline
      state: >
        {% set available = states('sensor.envoy_122322027694_available_battery_energy') | float(0) %}
        {% set needed = states('sensor.power_requirement_until_cheap_slot') | float(0) %}
        {% set diff = available - needed %}
        {{ diff if diff > 0 else 0 }}

    - name: "Power requirement until cheap slot"
      unit_of_measurement: "Wh"
      icon: mdi:flash
      state: >
        {% set idle_power = states('input_number.idle_power_draw') | float(0) %}
        {% set soft_limit = states('input_number.battery_lower_discharge_limit') | float(0) %}
        {% set hard_limit = states('input_number.battery_hard_lower_limit') | float(0) %}
        {% set battery_capacity = states('sensor.envoy_122322027694_battery_capacity') | float(0) %}

        {% set now_time = now() %}

        {# Find the next charge slot from optimal_charge_slots #}
        {% set charge_events = state_attr('sensor.optimal_charge_slots', 'events') or [] %}
        {% set ns_cheap = namespace(next_start=none) %}
        {% for event in charge_events %}
          {% set event_start = as_datetime(event.start) %}
          {% if event_start > now_time and ns_cheap.next_start is none %}
            {% set ns_cheap.next_start = event_start %}
          {% endif %}
        {% endfor %}

        {% if ns_cheap.next_start %}
          {# Time until cheap slot starts #}
          {% set hours_until_cheap = (ns_cheap.next_start - now_time).total_seconds() / 3600 %}

          {# Calculate energy needed during this period plus soft limit, clamped to hard limit #}
          {% set calculated = ((idle_power * hours_until_cheap) + soft_limit) | round(0) %}
          {% set clamped = [calculated, hard_limit] | max %}
          {{ [clamped, battery_capacity] | min }}
        {% else %}
          {# No cheap slot found — clamp soft limit to hard limit #}
          {% set clamped = [soft_limit, hard_limit] | max %}
          {{ [clamped, battery_capacity] | min }}
        {% endif %}

    - name: "Office AC power filtered"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% if states('climate.office_ac') in ['heat', 'cool'] %}
          {{ states('sensor.office_ac_power') }}
        {% else %}
          0
        {% endif %}

- binary_sensor:
    - name: One-room mode
      state: >
        {{ states('sensor.occupant_count') | int <= 1 }}
