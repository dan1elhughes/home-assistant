- sensor:
    - name: Occupant count
      state: >
        {{ states.person | selectattr('state', 'equalto', 'home') | list | count }}

    - name: Accumulative electricity cost without standing charge
      icon: mdi:currency-gbp
      unit_of_measurement: "£"
      state: >
        {{ state_attr('sensor.octopus_energy_electricity_15p0706167_2000050773706_current_accumulative_cost', 'total_without_standing_charge') }}

    - name: Accumulative gas cost without standing charge
      icon: mdi:currency-gbp
      unit_of_measurement: "£"
      state: >
        {{ state_attr('sensor.octopus_energy_gas_g4p07003781500_7475340302_current_accumulative_cost', 'total_without_standing_charge') }}

    - name: "Solar power generation"
      device_class: power
      state_class: measurement
      unit_of_measurement: "W"
      state: >
        {% set update_threshold = now() - timedelta(minutes=5) %}
        {% if states.sensor.myenergi_myenergi_hub_power_generation.last_updated < update_threshold %}
          0
        {% else %}
          {{ states('sensor.myenergi_myenergi_hub_power_generation') }}
        {% endif %}

    - name: "Solar power generation paid"
      unit_of_measurement: "£"
      state: >
        {{ (states('sensor.myenergi_myenergi_hub_generated_today') | float * states('input_number.fit_generation_per_kwh') | float) | round(2) }}

    - name: "Export paid"
      unit_of_measurement: "£"
      state: >
        {{ (states('sensor.myenergi_myenergi_hub_grid_export_today') | float * states('sensor.octopus_energy_electricity_15p0706167_2000060833200_export_current_rate') | float) | round(2) }}

    - name: "Garden sensor temperature"
      unit_of_measurement: "°C"
      icon: mdi:thermometer
      state: >
        {{ state_attr('weather.home', 'temperature') }}

    - name: "Garden sensor humidity"
      unit_of_measurement: "%"
      icon: mdi:water-percent
      state: >
        {{ state_attr('weather.home', 'humidity') }}

    - name: "Current energy intent"
      icon: mdi:lightning-bolt
      state: >
        {% set events = state_attr('sensor.energy_intents', 'events') or [] %}
        {% set now_time = now() %}
        {% set ns = namespace(current_intent='Idle') %}
        {% for event in events %}
          {% if event.start and event.end %}
            {% set start_dt = as_datetime(event.start) %}
            {% set end_dt = as_datetime(event.end) %}
            {% if start_dt <= now_time <= end_dt %}
              {% set ns.current_intent = event.intent %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.current_intent }}

    - name: "Next energy intent"
      icon: mdi:calendar-clock
      state: >
        {% set events = state_attr('sensor.energy_intents', 'events') or [] %}
        {% set now_time = now() %}
        {% set ns = namespace(found=false, intent='', start='', end='', is_current=false) %}

        {% for event in events %}
          {% if event.start %}
            {% set start_dt = as_datetime(event.start) %}
            {% set end_dt = as_datetime(event.end) if event.end is defined else None %}

            {# current intent #}
            {% if not ns.found and start_dt <= now_time and (end_dt is none or now_time < end_dt) %}
              {% set ns.intent = event.intent %}
              {% set ns.start = start_dt %}
              {% set ns.end = end_dt %}
              {% set ns.found = true %}
              {% set ns.is_current = true %}
            {% endif %}

            {# next intent #}
            {% if not ns.found and start_dt > now_time %}
              {% set ns.intent = event.intent %}
              {% set ns.start = start_dt %}
              {% set ns.found = true %}
            {% endif %}
          {% endif %}
        {% endfor %}

        {% if ns.found %}
          {% if ns.is_current %}
            {{ ns.intent }} until {{ ns.end.strftime('%H:%M') if ns.end else '?' }}
          {% else %}
            {{ ns.intent }} at {{ ns.start.strftime('%H:%M') }}
          {% endif %}
        {% else %}
          None
        {% endif %}

    - name: "Energy intents"
      icon: mdi:calendar
      state: "off"
      attributes:
        events: >
          {% set ns = namespace(charges=[], discharges=[]) %}
          {% set tz = now().tzinfo %}

          {# ======================================================= #}
          {# 1. COLLECT ALL GUARANTEED CHARGE SLOTS                  #}
          {# ======================================================= #}

          {# --- A. Free Electricity Sessions --- #}
          {% for cal in ['calendar.octopus_energy_a_fad3b08a_octoplus_free_electricity_session'] %}
            {% set start_raw = state_attr(cal, 'start_time') %}
            {% set end_raw = state_attr(cal, 'end_time') %}
            {% if start_raw and end_raw %}
              {% set start = as_datetime(start_raw).replace(tzinfo=tz) %}
              {% set end = as_datetime(end_raw).replace(tzinfo=tz) %}
              {% if end >= now() %}
                {% set ns.charges = ns.charges + [{'start': start, 'end': end, 'intent': 'Charge'}] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# --- B. Sensor Attributes (Current/Next Off-Peak) --- #}
          {% for state_type in ['current', 'next'] %}
            {% set start_attr = state_attr('binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak', state_type + '_start') %}
            {% set end_attr = state_attr('binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak', state_type + '_end') %}
            {% if start_attr and end_attr %}
              {% set start = as_datetime(start_attr).replace(tzinfo=tz) %}
              {% set end = as_datetime(end_attr).replace(tzinfo=tz) %}
              {% if end >= now() %}
                {% set ns.charges = ns.charges + [{'start': start, 'end': end, 'intent': 'Charge'}] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 2. FLATTEN CHARGE SLOTS (Strict Overlap Only)           #}
          {# ======================================================= #}
          {% set ns_flat = namespace(items=[]) %}
          {% set sorted_charges = ns.charges | sort(attribute='start') %}

          {% for c in sorted_charges %}
            {% if ns_flat.items | length == 0 %}
              {% set ns_flat.items = ns_flat.items + [c] %}
            {% else %}
              {% set last = ns_flat.items[-1] %}
              {# STRICT MERGE: Only if c starts before or exactly when last ends #}
              {% if c.start <= last.end %}
                {% set new_end = c.end if c.end > last.end else last.end %}
                {% set ns_flat.items = ns_flat.items[:-1] + [{'start': last.start, 'end': new_end, 'intent': 'Charge'}] %}
              {% else %}
                {% set ns_flat.items = ns_flat.items + [c] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# The flattened charges are now our "Anchors" #}
          {% set flat_charges = ns_flat.items %}

          {% set current_battery_kwh = states('sensor.envoy_122322027694_available_battery_energy') | float(0) / 1000 %}
          {% set min_discharge_threshold_kwh = states('sensor.power_requirement_until_cheap_slot') | float(0) / 1000 %}

          {# ======================================================= #}
          {# 3a. GENERATE DISCHARGE SLOTS (Optimal Discharge)       #}
          {# ======================================================= #}
          {% set ns_optimal_discharges = namespace(items=[]) %}

          {# Optimal Discharge Slots from Sensor #}
          {% set optimal_events = state_attr('sensor.optimal_discharge_slots', 'events') or [] %}
          {% for slot in optimal_events %}
            {% set start = as_datetime(slot.start).replace(tzinfo=tz) %}
            {% set end = as_datetime(slot.end).replace(tzinfo=tz) %}
            {% if end >= now() %}
              {% set ns_optimal_discharges.items = ns_optimal_discharges.items + [{'start': start, 'end': end, 'intent': 'Discharge'}] %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 4. FINAL PASS: COMBINE AND TRIM (Buffer Enforcement)    #}
          {# ======================================================= #}

          {% set all_raw = flat_charges + ns.discharges + ns_optimal_discharges.items %}
          {% set sorted_all = all_raw | sort(attribute='start') %}
          {% set ns_merged = namespace(items=[]) %}

          {% for event in sorted_all %}
            {% if ns_merged.items | length == 0 %}
              {% set ns_merged.items = ns_merged.items + [event] %}
            {% else %}
              {% set last = ns_merged.items[-1] %}

              {% if event.intent == last.intent %}
                {# -- Same Intent: Merge if touching/overlapping -- #}
                {% if event.start <= last.end %}
                  {% set new_end = event.end if event.end > last.end else last.end %}
                  {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': new_end, 'intent': last.intent}] %}
                {% else %}
                  {# GAP PRESERVATION: Maintain gap between non-touching same-intent events #}
                  {% set ns_merged.items = ns_merged.items + [event] %}
                {% endif %}

              {% else %}
                {# -- Different Intent: Conflict Resolution -- #}
                {% if event.start < last.end %}
                    {# Overlap #}
                      {% if event.intent == 'Charge' %}
                      {# Charge wins. Trim previous Discharge end. #}
                        {% set trimmed_last_end = event.start - timedelta(minutes=5) %}
                        {% if trimmed_last_end > last.start %}
                            {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': trimmed_last_end, 'intent': last.intent}] %}
                            {% set ns_merged.items = ns_merged.items + [event] %}
                        {% else %}
                            {% set ns_merged.items = ns_merged.items[:-1] + [event] %}
                        {% endif %}
                      {% else %}
                      {# Charge wins. Trim current Discharge start. #}
                        {% set trimmed_event_start = last.end + timedelta(minutes=5) %}
                        {% if trimmed_event_start < event.end %}
                          {% set ns_merged.items = ns_merged.items + [{'start': trimmed_event_start, 'end': event.end, 'intent': event.intent}] %}
                        {% endif %}
                      {% endif %}
                {% else %}
                    {# Gap check #}
                    {% set gap = (event.start - last.end).total_seconds() / 60 %}
                    {% if gap < 5 %}
                      {# Buffer violation #}
                        {% if event.intent == 'Charge' %}
                            {% set required_end = event.start - timedelta(minutes=5) %}
                            {% if required_end > last.start %}
                              {% set ns_merged.items = ns_merged.items[:-1] + [{'start': last.start, 'end': required_end, 'intent': last.intent}] %}
                              {% set ns_merged.items = ns_merged.items + [event] %}
                            {% else %}
                              {% set ns_merged.items = ns_merged.items[:-1] + [event] %}
                            {% endif %}
                        {% else %}
                            {% set required_start = last.end + timedelta(minutes=5) %}
                            {% if required_start < event.end %}
                              {% set ns_merged.items = ns_merged.items + [{'start': required_start, 'end': event.end, 'intent': event.intent}] %}
                            {% endif %}
                        {% endif %}
                    {% else %}
                      {% set ns_merged.items = ns_merged.items + [event] %}
                    {% endif %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 4b. FILTER: Never export if export price < min import price #}
          {# ======================================================= #}
          {% set current_import = states('sensor.octopus_energy_electricity_15p0706167_2000050773706_current_rate') | float(0) %}
          {% set next_import = states('sensor.octopus_energy_electricity_15p0706167_2000050773706_next_rate') | float(0) %}
          {% set min_import_rate = [current_import, next_import] | min %}
          {% set battery_efficiency = states('input_number.battery_round_trip_efficiency') | float(0.9) %}
          {% set adjusted_min_import = min_import_rate / battery_efficiency %}
          {% set export_rates = state_attr('event.octopus_energy_electricity_15p0706167_2000060833200_export_current_day_rates', 'rates') or [] %}

          {% set ns_filtered = namespace(items=[]) %}

          {% for e in ns_merged.items %}
            {% if e.intent != 'Discharge' %}
              {# Always keep non-discharge events #}
              {% set ns_filtered.items = ns_filtered.items + [e] %}
            {% else %}
              {# Check if export rate for this slot >= min import rate #}
              {% set slot_start = e.start %}
              {% set slot_end = e.end %}
              {% set ns_check = namespace(can_export=true, export_rate=none) %}

              {# Find export rate that overlaps with this slot #}
              {% for exp_rate in export_rates %}
                {% set exp_start = as_datetime(exp_rate.start) %}
                {% set exp_end = as_datetime(exp_rate.end) %}
                {# Check if export rate overlaps with slot #}
                {% if exp_start < slot_end and exp_end > slot_start %}
                  {% set ns_check.export_rate = exp_rate.value_inc_vat %}
                {% endif %}
              {% endfor %}

              {% if ns_check.export_rate is not none and ns_check.export_rate >= adjusted_min_import %}
                {% set ns_filtered.items = ns_filtered.items + [e] %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# ======================================================= #}
          {# 5. OUTPUT JSON                                          #}
          {# ======================================================= #}
          {% set ns_json = namespace(output=[]) %}
          {% for e in ns_filtered.items %}
            {% set ns_json.output = ns_json.output + [{'start': e.start.isoformat(), 'end': e.end.isoformat(), 'intent': e.intent}] %}
          {% endfor %}
          {{ ns_json.output | to_json }}

    - name: "Optimal discharge slots"
      icon: mdi:battery-charging-high
      state: "on"
      attributes:
        events: >
          {% set ns = namespace(discharges=[]) %}
          {% set tz = now().tzinfo %}

          {# Battery Parameters #}
          {% set battery_wh = states('sensor.envoy_122322027694_available_battery_energy') | float(0) %}
          {% set battery_kwh = battery_wh / 1000 %}
          {% set min_discharge_threshold_kwh = states('sensor.power_requirement_until_cheap_slot') | float(0) / 1000 %}
          {% set usable_kwh = [battery_kwh - min_discharge_threshold_kwh, 0] | max %}
          {% set discharge_rate_kw = states('input_number.battery_power_rate_kw') | float(9.6) %}

          {# Get export rates for the current day #}
          {% set export_rates = state_attr('event.octopus_energy_electricity_15p0706167_2000060833200_export_current_day_rates', 'rates') or [] %}

          {# Filter and sort export rates by price (highest first) #}
          {% set sorted_rates = export_rates | sort(attribute='value_inc_vat', reverse=true) %}

          {# Process each rate period, starting from highest #}
          {% set ns_loop = namespace(remaining_kwh=usable_kwh, processed_slots=[]) %}

          {% for rate in sorted_rates %}
            {% if ns_loop.remaining_kwh <= 0 %}
              {% break %}
            {% endif %}

            {# Parse the rate period #}
            {% set rate_start = as_datetime(rate.start).replace(tzinfo=tz) %}
            {% set rate_end = as_datetime(rate.end).replace(tzinfo=tz) %}

            {# Skip if in the past #}
            {% if rate_end <= now() %}
              {% continue %}
            {% endif %}

            {# Calculate how long we can discharge at this rate #}
            {% set rate_duration_hours = (rate_end - rate_start).total_seconds() / 3600 %}

            {# Determine actual discharge duration #}
            {% set actual_discharge_hours = [ns_loop.remaining_kwh / discharge_rate_kw, rate_duration_hours] | min %}
            {% set actual_discharge_kwh = actual_discharge_hours * discharge_rate_kw %}

            {# Calculate slot times - fill from END for non-full slots #}
            {% if actual_discharge_hours < rate_duration_hours %}
              {# Non-full slot: place at end of rate period #}
              {% set slot_start = rate_end - timedelta(hours=actual_discharge_hours) %}
              {% set slot_end = rate_end %}
            {% else %}
              {# Full slot: place at start of rate period #}
              {% set slot_start = rate_start %}
              {% set slot_end = rate_start + timedelta(hours=actual_discharge_hours) %}
            {% endif %}

            {# Calculate duration first, then round DOWN to 5-minute intervals #}
            {% set raw_duration_minutes = (slot_end - slot_start).total_seconds() / 60 %}
            {% set rounded_duration_minutes = ((raw_duration_minutes | int) // 5) * 5 %}

            {# Discard slots smaller than 5 minutes #}
            {% if rounded_duration_minutes < 5 %}
              {% continue %}
            {% endif %}

            {# Now apply the rounded duration to get end time #}
            {% set rounded_slot_start = slot_start.replace(second=0, microsecond=0) %}
            {% set rounded_slot_end = rounded_slot_start + timedelta(minutes=rounded_duration_minutes) %}

            {# Ensure slot is in the future #}
            {% if rounded_slot_end > now() %}
              {# Use the rounded start directly (already aligned) #}
              {% if rounded_slot_start < rounded_slot_end %}
                {% set ns_loop.processed_slots = ns_loop.processed_slots + [{
                  'start': rounded_slot_start,
                  'end': rounded_slot_end,
                  'intent': 'Discharge'
                }] %}
                {% set ns_loop.remaining_kwh = ns_loop.remaining_kwh - actual_discharge_kwh %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {# Sort final slots by start time #}
          {% set final_slots = ns_loop.processed_slots | sort(attribute='start') %}

          {# Output as JSON #}
          {% set ns_json = namespace(output=[]) %}
          {% for slot in final_slots %}
            {% set ns_json.output = ns_json.output + [{'start': slot.start.isoformat(), 'end': slot.end.isoformat(), 'intent': slot.intent}] %}
          {% endfor %}
          {{ ns_json.output | to_json }}

    - name: "Battery total power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {{
          (
            states('sensor.encharge_492452002777_power') | float(0)
            +
            states('sensor.encharge_492452002785_power') | float(0)
            +
            states('sensor.encharge_492452002787_power') | float(0)
          )
        }}

    - name: "Battery total discharge power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set p = states('sensor.battery_total_power') | float(0) %}
        {{ p if p > 0 else 0 }}

    - name: "Battery total charge power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement
      state: >
        {% set p = states('sensor.battery_total_power') | float(0) %}
        {{ (p * -1) if p < 0 else 0 }}

    - name: "Battery energy charged"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('input_number.battery_energy_charged_wh') | float(0)) / 1000 }}

    - name: "Battery energy discharged"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing
      state: >
        {{ (states('input_number.battery_energy_discharged_wh') | float(0)) / 1000 }}

    - name: "ID3 charge time remaining"
      unit_of_measurement: "h"
      icon: mdi:timer-outline
      state: >
        {% set current_soc = states('sensor.id3_battery_level') | float(none) %}
        {% set target_soc = states('number.id3_battery_target_charge_level') | float(none) %}
        {% set capacity = 58 %}
        {% set power = 2 %}

        {% if current_soc is not none and target_soc is not none %}
          {% set soc_diff = target_soc - current_soc %}
          {% if soc_diff > 0 %}
            {{ (soc_diff / 100 * capacity / power) | round(2) }}
          {% else %}
            0.0
          {% endif %}
        {% else %}
          unavailable
        {% endif %}

    - name: "Exportable battery"
      unit_of_measurement: "Wh"
      icon: mdi:battery-arrow-up-outline
      state: >
        {% set available = states('sensor.envoy_122322027694_available_battery_energy') | float(0) %}
        {% set needed = states('sensor.power_requirement_until_cheap_slot') | float(0) %}
        {% set diff = available - needed %}
        {{ diff if diff > 0 else 0 }}

    - name: "Power requirement until cheap slot"
      unit_of_measurement: "Wh"
      icon: mdi:flash
      state: >
        {% set idle_power = states('input_number.idle_power_draw') | float(0) %}
        {% set battery_minimum = states('input_number.battery_lower_discharge_limit') | float(0) %}
        {% set battery_capacity = states('sensor.envoy_122322027694_battery_capacity') | float(0) %}

        {% set next_start = state_attr('binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak', 'next_start') %}

        {% set now_time = now() %}

        {% if next_start %}
          {% set next_start_dt = as_datetime(next_start) %}

          {# Time until cheap slot starts #}
          {% set hours_until_cheap = (next_start_dt - now_time).total_seconds() / 3600 %}

          {# Calculate energy needed during this period plus battery minimum #}
          {% set calculated = ((idle_power * hours_until_cheap) + battery_minimum) | round(0) %}
          {{ [calculated, battery_capacity] | min }}
        {% else %}
          {# No cheap slot found #}
          {{ [battery_minimum, battery_capacity] | min }}
        {% endif %}

- binary_sensor:
    - name: One-room mode
      state: >
        {{ states('sensor.occupant_count') | int <= 1 }}

- switch:
    - turn_on:
        - target:
            entity_id:
              - climate.barn_ac
          data:
            hvac_mode: heat
          action: climate.set_hvac_mode
      turn_off:
        - target:
            entity_id:
              - climate.barn_ac
          data:
            hvac_mode: "off"
          action: climate.set_hvac_mode
      default_entity_id: switch.barn_ac_power
      name: Barn AC Power
      state: "{{ states('climate.barn_ac') in ['heat','cool','heat_cool','fan_only','dry'] }}"
