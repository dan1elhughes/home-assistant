# Daily pure-house-load counter for Predbat's load_today.
#
# Cycles at local midnight; total_increasing within the day and resetting to 0
# each midnight -- exactly the shape Predbat's load_today expects. The source is
# the Riemann integration sensor.predbat_house_load_energy (see sensor.yaml),
# which integrates sensor.predbat_house_load_power (pure house load).
#
# This replaces the Envoy energy_consumption_today counter, which over-counts by
# battery charging (Envoy "consumption" = house + battery_charge), so an
# overnight battery charge would otherwise appear as a phantom house-load spike
# in Predbat's plan. Note: utility_meter only accrues going forward -- there is
# no retroactive backfill, so the corrected load model warms up over ~7 days
# (days_previous).
predbat_house_load_today:
  source: sensor.predbat_house_load_energy
  cycle: daily
