- alias: "Front door person sets desk light blue"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.doorbell_person
      to: "on"
  condition:
    - condition: state
      entity_id: light.desk_light
      state: "on"
  action:
    - action: light.turn_on
      target:
        entity_id: light.desk_light
      data:
        color_name: blue

- alias: "Front door ring sets desk light green"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.doorbell_visitor
      to: "on"
  action:
    - repeat:
        count: 3
        sequence:
          - action: light.turn_off
            target:
              entity_id: light.desk_light
          - delay:
              milliseconds: 500
          - action: light.turn_on
            target:
              entity_id: light.desk_light
            data:
              color_name: green
          - delay:
              milliseconds: 500
