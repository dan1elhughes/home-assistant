- alias: "Curtains partially closed at sunset"
  mode: single
  triggers:
    - trigger: sun
      event: sunset
  action:
    - action: cover.set_cover_position
      target:
        entity_id: cover.curtains
      data:
        position: 50

- alias: "Dawn actions"
  mode: single
  triggers:
    - trigger: numeric_state
      entity_id: sun.sun
      attribute: elevation
      above: -6
  condition:
    - alias: "Home"
      condition: state
      entity_id: group.presence_home
      state: home
  action:
    - alias: "Slowly close curtains"
      action: v6_quietdrift.set_switchbot_curtain_position
      data:
        position: 0
        entity_id: cover.curtains
        speed: 1
    - alias: "Enable hallway motion sensors"
      action: input_boolean.turn_on
      target:
        entity_id: input_boolean.motion_sensors_enabled
