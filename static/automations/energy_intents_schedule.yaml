- alias: "Update Enphase Schedule on Energy Intents Change"
  mode: single
  description: "Triggers when sensor.energy_intents changes and updates the Enphase battery schedules using enphase_envoy_cloud_control integration."
  trigger:
    - platform: state
      entity_id: sensor.energy_intents
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.enphase_schedules_summary
          state: unavailable
  action:
    - alias: "Extract charge and discharge events from energy intents"
      variables:
        events: "{{ state_attr('sensor.energy_intents', 'events') or [] }}"
        charge_events: "{{ events | selectattr('intent', 'equalto', 'Charge') | list }}"
        discharge_events: "{{ events | selectattr('intent', 'equalto', 'Discharge') | list }}"

    - alias: "Log energy intents change"
      service: system_log.write
      data:
        logger: EnphaseSchedule
        level: info
        message: "Energy intents changed: {{ charge_events | length }} charge, {{ discharge_events | length }} discharge events"

    - alias: "Get current schedules to delete"
      variables:
        current_schedules: "{{ (state_attr('sensor.enphase_schedules', 'cfg') or []) + (state_attr('sensor.enphase_schedules', 'dtg') or []) + (state_attr('sensor.enphase_schedules', 'rbd') or []) }}"

    - alias: "Log existing schedules count"
      service: system_log.write
      data:
        logger: EnphaseSchedule
        level: info
        message: "Found {{ current_schedules | length }} existing schedules to delete"

    - alias: "Delete all existing schedules"
      repeat:
        for_each: "{{ current_schedules }}"
        sequence:
          - alias: "Log schedule deletion"
            service: system_log.write
            data:
              logger: EnphaseSchedule
              level: info
              message: "Deleting schedule ID: {{ repeat.item }}"

          - alias: "Select schedule to delete"
            service: select.select_option
            target:
              entity_id: select.enphase_schedule_selected
            data:
              option: "{{ repeat.item }}"

          - delay: "00:00:01"

          - alias: "Delete selected schedule"
            service: button.press
            target:
              entity_id: button.schedule_delete

          - delay: "00:00:01"

    - alias: "Log schedule deletion complete"
      service: system_log.write
      data:
        logger: EnphaseSchedule
        level: info
        message: "Deleted {{ current_schedules | length }} existing schedules"

    - alias: "Add charge (CFG) schedules"
      repeat:
        for_each: "{{ charge_events }}"
        sequence:
          - alias: "Log CFG schedule creation"
            service: system_log.write
            data:
              logger: EnphaseSchedule
              level: info
              message: "Adding CFG charge schedule: {{ repeat.item.start }} to {{ repeat.item.end }}"

          - alias: "Set schedule type to CFG"
            service: select.select_option
            target:
              entity_id: select.enphase_new_schedule_type
            data:
              option: "cfg"

          - alias: "Set start time"
            service: time.set_value
            target:
              entity_id: time.enphase_new_schedule_start
            data:
              time: "{{ as_datetime(repeat.item.start).strftime('%H:%M') }}"

          - alias: "Set end time"
            service: time.set_value
            target:
              entity_id: time.enphase_new_schedule_end
            data:
              time: "{{ as_datetime(repeat.item.end).strftime('%H:%M') }}"

          - alias: "Set charge limit to 100%"
            service: number.set_value
            target:
              entity_id: number.enphase_new_schedule_limit
            data:
              value: 100

          - alias: "Set the single day"
            variables:
              weekday: "{{ as_datetime(repeat.item.start).weekday() }}"

          - alias: "Disable all weekday switches"
            service: homeassistant.turn_off
            target:
              entity_id:
                - switch.enphase_new_schedule_mon
                - switch.enphase_new_schedule_tue
                - switch.enphase_new_schedule_wed
                - switch.enphase_new_schedule_thu
                - switch.enphase_new_schedule_fri
                - switch.enphase_new_schedule_sat
                - switch.enphase_new_schedule_sun

          - alias: "Enable selected weekday"
            service: homeassistant.turn_on
            target:
              entity_id: >
                {% set day_entities = {
                  0: 'switch.enphase_new_schedule_mon',
                  1: 'switch.enphase_new_schedule_tue',
                  2: 'switch.enphase_new_schedule_wed',
                  3: 'switch.enphase_new_schedule_thu',
                  4: 'switch.enphase_new_schedule_fri',
                  5: 'switch.enphase_new_schedule_sat',
                  6: 'switch.enphase_new_schedule_sun'
                } %}
                {{ [day_entities[weekday]] }}

          - delay: "00:00:02"

          - alias: "Add the schedule"
            service: button.press
            target:
              entity_id: button.new_schedule_add

          - delay: "00:00:02"

          - alias: "Log CFG schedule added"
            service: system_log.write
            data:
              logger: EnphaseSchedule
              level: info
              message: "Added CFG charge schedule {{ repeat.item.start }} - {{ repeat.item.end }}"
    
    - alias: "Add discharge (DTG) schedules"
      repeat:
        for_each: "{{ discharge_events }}"
        sequence:
          - alias: "Log DTG schedule creation"
            service: system_log.write
            data:
              logger: EnphaseSchedule
              level: info
              message: "Adding DTG discharge schedule: {{ repeat.item.start }} to {{ repeat.item.end }}"

          - alias: "Set schedule type to DTG"
            service: select.select_option
            target:
              entity_id: select.enphase_new_schedule_type
            data:
              option: "dtg"

          - alias: "Set start time"
            service: time.set_value
            target:
              entity_id: time.enphase_new_schedule_start
            data:
              time: "{{ as_datetime(repeat.item.start).strftime('%H:%M') }}"

          - alias: "Set end time"
            service: time.set_value
            target:
              entity_id: time.enphase_new_schedule_end
            data:
              time: "{{ as_datetime(repeat.item.end).strftime('%H:%M') }}"

          - alias: "Set discharge limit to 6%"
            service: number.set_value
            target:
              entity_id: number.enphase_new_schedule_limit
            data:
              value: 6

          - alias: "Set the single day"
            variables:
              weekday: "{{ as_datetime(repeat.item.start).weekday() }}"

          - alias: "Disable all weekday switches"
            service: homeassistant.turn_off
            target:
              entity_id:
                - switch.enphase_new_schedule_mon
                - switch.enphase_new_schedule_tue
                - switch.enphase_new_schedule_wed
                - switch.enphase_new_schedule_thu
                - switch.enphase_new_schedule_fri
                - switch.enphase_new_schedule_sat
                - switch.enphase_new_schedule_sun

          - alias: "Enable selected weekday"
            service: homeassistant.turn_on
            target:
              entity_id: >
                {% set day_entities = {
                  0: 'switch.enphase_new_schedule_mon',
                  1: 'switch.enphase_new_schedule_tue',
                  2: 'switch.enphase_new_schedule_wed',
                  3: 'switch.enphase_new_schedule_thu',
                  4: 'switch.enphase_new_schedule_fri',
                  5: 'switch.enphase_new_schedule_sat',
                  6: 'switch.enphase_new_schedule_sun'
                } %}
                {{ [day_entities[weekday]] }}

          - delay: "00:00:02"

          - alias: "Add the schedule"
            service: button.press
            target:
              entity_id: button.new_schedule_add

          - delay: "00:00:02"

          - alias: "Log DTG schedule added"
            service: system_log.write
            data:
              logger: EnphaseSchedule
              level: info
              message: "Added DTG discharge schedule {{ repeat.item.start }} - {{ repeat.item.end }}"
    
    - alias: "Enable/disable CFG based on charge events"
      if:
        - condition: template
          value_template: "{{ charge_events | length > 0 }}"
      then:
        - alias: "Log CFG enable"
          service: system_log.write
          data:
            logger: EnphaseSchedule
            level: info
            message: "Enabling CFG (charge from grid)"

        - alias: "Enable CFG mode"
          service: homeassistant.turn_on
          target:
            entity_id: switch.enphase_cfg_mode
      else:
        - alias: "Log CFG disable"
          service: system_log.write
          data:
            logger: EnphaseSchedule
            level: info
            message: "Disabling CFG (no charge schedules)"

        - alias: "Disable CFG mode"
          service: homeassistant.turn_off
          target:
            entity_id: switch.enphase_cfg_mode

    - alias: "Enable/disable DTG based on discharge events"
      if:
        - condition: template
          value_template: "{{ discharge_events | length > 0 }}"
      then:
        - alias: "Log DTG enable"
          service: system_log.write
          data:
            logger: EnphaseSchedule
            level: info
            message: "Enabling DTG (discharge to grid)"

        - alias: "Enable DTG mode"
          service: homeassistant.turn_on
          target:
            entity_id: switch.enphase_dtg_mode
      else:
        - alias: "Log DTG disable"
          service: system_log.write
          data:
            logger: EnphaseSchedule
            level: info
            message: "Disabling DTG (no discharge schedules)"

        - alias: "Disable DTG mode"
          service: homeassistant.turn_off
          target:
            entity_id: switch.enphase_dtg_mode

    - alias: "Force cloud refresh"
      service: system_log.write
      data:
        logger: EnphaseSchedule
        level: info
        message: "Forcing cloud refresh"

    - alias: "Press cloud refresh button"
      service: button.press
      target:
        entity_id: button.force_cloud_refresh

    - alias: "Log schedule update complete"
      service: system_log.write
      data:
        logger: EnphaseSchedule
        level: info
        message: "Energy schedule update complete"