- alias: "Predbat control v2"
  mode: single
  description: "Direct battery control — reads sensor.predbat_intent and maintains exactly one Enphase schedule. No plan parsing."
  trigger:
    - platform: state
      entity_id: sensor.predbat_intent
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: template
      value_template: "{{ states('sensor.predbat_intent') not in ['unknown', 'unavailable', ''] }}"
  action:
    - alias: "Parse intent"
      variables:
        intent: "{{ states('sensor.predbat_intent') }}"
        action: "{{ 'charge' if 'Chrg' in intent else 'export' if 'Exp' in intent else 'idle' }}"
        sched_type: "{{ 'cfg' if action == 'charge' else 'dtg' if action == 'export' else '' }}"
        sched_limit: >
          {% set m = intent | regex_findall('\\d+') %}
          {{ m[0] if m | length > 0 else '' }}
        sched_start: "{{ now().strftime('%H:%M') }}"
        sched_day: "{{ now().isoweekday() }}"

        sched_end: >
          {% if action in ['charge', 'export'] %}
            {% set t = now().replace(second=0, microsecond=0) %}
            {% set boundary = t + timedelta(minutes=30 - t.minute % 30) %}
            {% set min_end = t + timedelta(minutes=5) %}
            {% if boundary < min_end %}{{ min_end.strftime('%H:%M') }}
            {% else %}{{ boundary.strftime('%H:%M') }}
            {% endif %}
          {% endif %}

    - alias: "Log decision"
      action: system_log.write
      data:
        logger: PredbatControlV2
        level: info
        message: >-
          {{ now().strftime('%H:%M:%S') }}
          intent={{ intent }}
          action={{ action }}
          {{ sched_type }} {{ sched_start }}-{{ sched_end }} limit={{ sched_limit }} day={{ sched_day }}

    - alias: "Read existing schedules and find match"
      variables:
        existing: "{{ state_attr('sensor.enphase_schedules_summary', 'schedules') or [] }}"
        match_id: >
          {% if action in ['charge', 'export'] and sched_limit != '' %}
            {% set ns = namespace(id='') %}
            {% for s in existing %}
              {% if s.type == sched_type and ns.id == '' %}
                {% set ns.id = s.id %}
              {% endif %}
            {% endfor %}
            {{ ns.id }}
          {% endif %}
        needs_update: >
          {% if match_id | trim != '' %}
            {% set ns = namespace(val=false) %}
            {% for s in existing %}
              {% if (s.id | string) == (match_id | string) %}
                {% if s.start != sched_start or s.end != sched_end
                   or (s.limit | string) != (sched_limit | string)
                   or (sched_day | string) not in (s.days | map('string') | list) %}
                  {% set ns.val = true %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.val }}
          {% else %}false
          {% endif %}

    - alias: "Delete obsolete schedules"
      repeat:
        for_each: "{{ existing }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ (repeat.item.id | string) != (match_id | string) }}"
            then:
              - action: enphase_envoy_cloud_control.delete_schedule
                data:
                  schedule_id: "{{ repeat.item.id }}"
                  confirm: true

    - delay: "00:00:01"

    - alias: "Upsert desired schedule"
      if:
        - condition: template
          value_template: "{{ action in ['charge', 'export'] and sched_limit != '' and (match_id | trim == '' or needs_update) }}"
      then:
        - if:
            - condition: template
              value_template: "{{ match_id | trim != '' }}"
          then:
            - action: enphase_envoy_cloud_control.update_schedule
              data:
                schedule_id: "{{ match_id }}"
                schedule_type: "{{ sched_type }}"
                start_time: "{{ sched_start }}"
                end_time: "{{ sched_end }}"
                limit: "{{ sched_limit }}"
                days:
                  - "{{ sched_day }}"
                confirm: true
          else:
            - action: enphase_envoy_cloud_control.add_schedule
              data:
                schedule_type: "{{ sched_type }}"
                start_time: "{{ sched_start }}"
                end_time: "{{ sched_end }}"
                limit: "{{ sched_limit }}"
                days:
                  - "{{ sched_day }}"

    - alias: "Ensure mode switches are on"
      action: homeassistant.turn_on
      target:
        entity_id:
          - switch.enphase_cfg_mode
          - switch.enphase_dtg_mode

    - alias: "Log completion"
      action: system_log.write
      data:
        logger: PredbatControlV2
        level: info
        message: "Done — action={{ action }}"
