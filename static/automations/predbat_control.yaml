- alias: "Predbat control"
  mode: single
  description: "Reads Predbat's charge/export plan and updates Enphase battery schedules via enphase_envoy_cloud_control. Mutates existing schedules in-place where possible to avoid mode toggling and API churn."
  trigger:
    - platform: state
      entity_id: predbat.plan_html
    - platform: state
      entity_id: input_number.predbat_max_enphase_schedules
  condition:
    - condition: not
      conditions:
        - condition: state
          entity_id: sensor.enphase_schedules_summary
          state: unavailable
  action:
    - alias: "Log automation start"
      action: system_log.write
      data:
        logger: PredbatControl
        level: info
        message: "Automation triggered - reading plan and schedules"
    - alias: "Extract Predbat plan"
      variables:
        raw_plan: "{{ state_attr('predbat.plan_html', 'raw') or {} }}"
        current_schedules: "{{ state_attr('sensor.enphase_schedules_summary', 'schedules') or [] }}"

    - alias: "Build desired schedules from Predbat plan"
      variables:
        desired_schedules: >
          {% set raw = state_attr('predbat.plan_html', 'raw') or {} %}
          {% set rows = raw.get('rows', []) %}
          {% set ns = namespace(list=[]) %}
          {% set ns.group = none %}
          {% for i in range(rows | length) %}
            {% set r = rows[i] %}
            {% set row_ts = as_datetime(r.time) %}
            {% if i + 1 < (rows | length) %}
              {% set slot_end_ts = as_datetime(rows[i + 1].time) %}
            {% else %}
              {% set slot_end_ts = row_ts + timedelta(minutes=30) %}
            {% endif %}
            {% set state = r.state %}
            {% set is_charge = state in ['Chrg', 'HoldChrg'] %}
            {% set is_export = state == 'Exp' %}
            {% if is_charge or is_export %}
              {% set intent = 'cfg' if is_charge else 'dtg' %}
              {% if ns.group is none %}
                {% set ns.group = {
                  'type': intent,
                  'day': row_ts.isoweekday(),
                  'start_time': row_ts.strftime('%H:%M'),
                  'end_time': slot_end_ts.strftime('%H:%M'),
                  'limit': (r.state_target | string) | int(0),
                  'first_time': r.time,
                  'last_time': r.time
                } %}
              {% elif ns.group.type == intent %}
                {% set ns.group = dict(ns.group, end_time=slot_end_ts.strftime('%H:%M'), limit=(r.state_target | string) | int(0), last_time=r.time) %}
              {% else %}
                {% if ns.group.limit > 0 %}
                  {% set ns.list = ns.list + [ns.group] %}
                {% endif %}
                {% set ns.group = {
                  'type': intent,
                  'day': row_ts.isoweekday(),
                  'start_time': row_ts.strftime('%H:%M'),
                  'end_time': slot_end_ts.strftime('%H:%M'),
                  'limit': (r.state_target | string) | int(0),
                  'first_time': r.time,
                  'last_time': r.time
                } %}
              {% endif %}
            {% elif ns.group is not none %}
              {% if ns.group.limit > 0 %}
                {% set ns.list = ns.list + [ns.group] %}
              {% endif %}
              {% set ns.group = none %}
            {% endif %}
          {% endfor %}
          {% if ns.group is not none and ns.group.limit > 0 %}
            {% set ns.list = ns.list + [ns.group] %}
          {% endif %}
          {% set ns2 = namespace(list=[]) %}
          {% for i in range(ns.list | length) %}
            {% set sched = ns.list[i] %}
            {% if i > 0 and ns.list[i-1].type != sched.type %}
              {# Only shorten when the previous schedule ends exactly when the
                 current one starts — i.e. they're truly back-to-back and the
                 inverter needs a gap to switch modes. Non-adjacent schedules
                 (e.g. charge ends 05:30, discharge starts 18:30) already have
                 a natural gap and must not be shortened. #}
              {% set prev_end = as_datetime(ns.list[i-1].last_time) + timedelta(minutes=30) %}
              {% set curr_start = as_datetime(sched.first_time) %}
              {% if prev_end == curr_start %}
                {% set prev = ns2.list[-1] %}
                {% set prev_end_dt = as_datetime(prev.last_time) + timedelta(minutes=25) %}
                {% set prev_new_end = prev_end_dt.strftime('%H:%M') %}
                {% set updated_prev = dict(prev, end_time=prev_new_end) %}
                {% set ns2.list = ns2.list[:-1] + [updated_prev] %}
              {% endif %}
            {% endif %}
            {% set ns2.list = ns2.list + [sched] %}
          {% endfor %}
          {# Enphase has a 12-schedule hard cap — keep only future schedules and cap via input_number. #}
          {% set max_schedules = states('input_number.predbat_max_enphase_schedules') | int(12) %}
          {% set future = ns2.list | selectattr('first_time', 'ge', now().isoformat()) | list %}
          {{ future[:max_schedules] }}

        charge_exists: "{{ desired_schedules | selectattr('type', 'equalto', 'cfg') | list | length > 0 }}"
        discharge_exists: "{{ desired_schedules | selectattr('type', 'equalto', 'dtg') | list | length > 0 }}"

    - alias: "Compute schedule mutation plan"
      variables:
        mutation_plan: >
          {% set ns = namespace(used_ids=[], to_update=[], to_add=[], to_delete=[]) %}
          {% for desired in desired_schedules %}
            {% set d_min = (desired.start_time[:2] | int) * 60 + (desired.start_time[3:5] | int) %}
            {% set match_ns = namespace(best_match=none, best_diff=9999) %}
            {% for existing in current_schedules %}
              {% if existing.id not in ns.used_ids and existing.type == desired.type %}
                {% for day in existing.days %}
                  {% if day == desired.day %}
                    {% set c_min = (existing.start[:2] | int) * 60 + (existing.start[3:5] | int) %}
                    {% set diff = d_min - c_min %}
                    {% if diff < 0 %}{% set diff = -diff %}{% endif %}
                    {% if diff < match_ns.best_diff %}
                      {% set match_ns.best_match = existing %}
                      {% set match_ns.best_diff = diff %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
              {% endif %}
            {% endfor %}
            {% if match_ns.best_match is not none %}
              {% set ns.used_ids = ns.used_ids + [match_ns.best_match.id] %}
              {% if match_ns.best_match.start != desired.start_time or match_ns.best_match.end != desired.end_time or (match_ns.best_match.limit | string) != (desired.limit | string) %}
                {% set ns.to_update = ns.to_update + [{'existing_id': match_ns.best_match.id, 'desired': desired}] %}
              {% endif %}
            {% else %}
              {% set ns.to_add = ns.to_add + [desired] %}
            {% endif %}
          {% endfor %}
          {% for existing in current_schedules %}
            {% if existing.id not in ns.used_ids %}
              {% set ns.to_delete = ns.to_delete + [existing] %}
            {% endif %}
          {% endfor %}
          {#
            Order updates by the schedules that currently occupy each target
            interval.  If update i wants a target interval that overlaps the
            current interval of update j, then j must move before i.

            Intervals are treated as half-open weekly ranges [start, end), so
            adjacent schedules such as 07:35-08:05 and 08:05-08:35 do not
            overlap.  Overnight schedules are split at the end of the week when
            needed so Sunday -> Monday ranges compare correctly.

            If no update is ready, the remaining updates are in a swap/cycle.
            Break that cycle by deleting one schedule and recreating it at the
            end, so the other schedule(s) can vacate their old intervals first.
          #}
          {% set updates_with_old = namespace(list=[]) %}
          {% for update in ns.to_update %}
            {% for existing in current_schedules %}
              {% if existing.id == update.existing_id %}
                {% set updates_with_old.list = updates_with_old.list + [dict(update, old=existing)] %}
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% set order = namespace(remaining=updates_with_old.list, ordered=[], cycle_deletes=[], cycle_adds=[], cycle_detected=false) %}
          {% for _ in range(updates_with_old.list | length) %}
            {% set pick = namespace(update=none) %}
            {% for update in order.remaining %}
              {% if pick.update is none %}
                {% set blocked = namespace(value=false) %}
                {% set new_start_min = (update.desired.start_time[:2] | int) * 60 + (update.desired.start_time[3:5] | int) %}
                {% set new_end_min = (update.desired.end_time[:2] | int) * 60 + (update.desired.end_time[3:5] | int) %}
                {% set new_abs_start = (update.desired.day - 1) * 1440 + new_start_min %}
                {% set new_abs_end = (update.desired.day - 1) * 1440 + new_end_min %}
                {% if new_end_min <= new_start_min %}
                  {% set new_abs_end = new_abs_end + 1440 %}
                {% endif %}
                {% set new_ranges = namespace(list=[]) %}
                {% if new_abs_end > 10080 %}
                  {% set new_ranges.list = [[new_abs_start, 10080], [0, new_abs_end - 10080]] %}
                {% else %}
                  {% set new_ranges.list = [[new_abs_start, new_abs_end]] %}
                {% endif %}
                {% for other in order.remaining %}
                  {% if other.existing_id != update.existing_id %}
                    {% set old_start_min = (other.old.start[:2] | int) * 60 + (other.old.start[3:5] | int) %}
                    {% set old_end_min = (other.old.end[:2] | int) * 60 + (other.old.end[3:5] | int) %}
                    {% for old_day in other.old.days %}
                      {% set old_abs_start = (old_day - 1) * 1440 + old_start_min %}
                      {% set old_abs_end = (old_day - 1) * 1440 + old_end_min %}
                      {% if old_end_min <= old_start_min %}
                        {% set old_abs_end = old_abs_end + 1440 %}
                      {% endif %}
                      {% set old_ranges = namespace(list=[]) %}
                      {% if old_abs_end > 10080 %}
                        {% set old_ranges.list = [[old_abs_start, 10080], [0, old_abs_end - 10080]] %}
                      {% else %}
                        {% set old_ranges.list = [[old_abs_start, old_abs_end]] %}
                      {% endif %}
                      {% for new_range in new_ranges.list %}
                        {% for old_range in old_ranges.list %}
                          {% if new_range[0] < old_range[1] and new_range[1] > old_range[0] %}
                            {% set blocked.value = true %}
                          {% endif %}
                        {% endfor %}
                      {% endfor %}
                    {% endfor %}
                  {% endif %}
                {% endfor %}
                {% if not blocked.value %}
                  {% set pick.update = update %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if pick.update is none %}
              {% set order.cycle_detected = true %}
              {% if order.remaining | length > 0 %}
                {% set victim = order.remaining[0] %}
                {% set order.cycle_deletes = order.cycle_deletes + [victim.old] %}
                {% set order.cycle_adds = order.cycle_adds + [victim.desired] %}
                {% set next_remaining = namespace(list=[]) %}
                {% for update in order.remaining %}
                  {% if update.existing_id != victim.existing_id %}
                    {% set next_remaining.list = next_remaining.list + [update] %}
                  {% endif %}
                {% endfor %}
                {% set order.remaining = next_remaining.list %}
              {% endif %}
            {% else %}
              {% set order.ordered = order.ordered + [pick.update] %}
              {% set next_remaining = namespace(list=[]) %}
              {% for update in order.remaining %}
                {% if update.existing_id != pick.update.existing_id %}
                  {% set next_remaining.list = next_remaining.list + [update] %}
                {% endif %}
              {% endfor %}
              {% set order.remaining = next_remaining.list %}
            {% endif %}
          {% endfor %}
          {% set changes = namespace(list=[]) %}
          {% for existing in ns.to_delete %}
            {% set changes.list = changes.list + [{'action': 'delete', 'existing': existing}] %}
          {% endfor %}
          {% for existing in order.cycle_deletes %}
            {% set changes.list = changes.list + [{'action': 'delete', 'existing': existing, 'reason': 'cycle_break'}] %}
          {% endfor %}
          {% for update in order.ordered + order.remaining %}
            {% set changes.list = changes.list + [{'action': 'update', 'existing_id': update.existing_id, 'desired': update.desired}] %}
          {% endfor %}
          {% for desired in ns.to_add %}
            {% set changes.list = changes.list + [{'action': 'add', 'desired': desired}] %}
          {% endfor %}
          {% for desired in order.cycle_adds %}
            {% set changes.list = changes.list + [{'action': 'add', 'desired': desired, 'reason': 'cycle_break'}] %}
          {% endfor %}
          {{ {
            'changes': changes.list,
            'to_update': order.ordered + order.remaining,
            'to_add': ns.to_add + order.cycle_adds,
            'to_delete': ns.to_delete + order.cycle_deletes,
            'cycle_recreate': order.cycle_adds,
            'cycle_detected': order.cycle_detected
          } }}

    - alias: "Log Predbat plan"
      action: system_log.write
      data:
        logger: PredbatControl
        level: info
        message: >-
          Desired: {{ desired_schedules | tojson }};
          Mutation: {{ mutation_plan | tojson }}

    - alias: "Apply ordered schedule changes"
      repeat:
        for_each: "{{ mutation_plan.changes }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ repeat.item.action == 'delete' }}"
                sequence:
                  - alias: "Log schedule deletion"
                    action: system_log.write
                    data:
                      logger: PredbatControl
                      level: info
                      message: "Deleting schedule {{ repeat.item.existing.id }}: {{ repeat.item.existing.type }}"

                  - alias: "Select schedule to delete"
                    action: select.select_option
                    target:
                      entity_id: select.enphase_schedule_selected
                    data:
                      option: "{{ repeat.item.existing.id }}"

                  - delay: "00:00:01"

                  - alias: "Delete selected schedule"
                    action: button.press
                    target:
                      entity_id: button.schedule_delete

                  - delay: "00:00:01"

              - conditions:
                  - condition: template
                    value_template: "{{ repeat.item.action == 'update' }}"
                sequence:
                  - alias: "Log schedule update"
                    action: system_log.write
                    data:
                      logger: PredbatControl
                      level: info
                      message: >-
                        Updating schedule {{ repeat.item.existing_id }}:
                        {{ repeat.item.desired.type }} day {{ repeat.item.desired.day }},
                        {{ repeat.item.desired.start_time }}-{{ repeat.item.desired.end_time }} (limit {{ repeat.item.desired.limit }})

                  - alias: "Update schedule via service"
                    action: enphase_envoy_cloud_control.update_schedule
                    data:
                      schedule_id: "{{ repeat.item.existing_id }}"
                      schedule_type: "{{ repeat.item.desired.type }}"
                      start_time: "{{ repeat.item.desired.start_time }}"
                      end_time: "{{ repeat.item.desired.end_time }}"
                      limit: "{{ repeat.item.desired.limit }}"
                      days:
                        - "{{ repeat.item.desired.day }}"
                      confirm: true

                  - delay: "00:00:02"

              - conditions:
                  - condition: template
                    value_template: "{{ repeat.item.action == 'add' }}"
                sequence:
                  - alias: "Log schedule creation"
                    action: system_log.write
                    data:
                      logger: PredbatControl
                      level: info
                      message: >-
                        Adding {{ repeat.item.desired.type }} schedule:
                        {{ repeat.item.desired.start_time }}-{{ repeat.item.desired.end_time }}
                        (limit {{ repeat.item.desired.limit }}, day {{ repeat.item.desired.day }})

                  - alias: "Set schedule type"
                    action: select.select_option
                    target:
                      entity_id: select.enphase_new_schedule_type
                    data:
                      option: "{{ repeat.item.desired.type }}"

                  - alias: "Set start time"
                    action: time.set_value
                    target:
                      entity_id: time.enphase_new_schedule_start
                    data:
                      time: "{{ repeat.item.desired.start_time }}"

                  - alias: "Set end time"
                    action: time.set_value
                    target:
                      entity_id: time.enphase_new_schedule_end
                    data:
                      time: "{{ repeat.item.desired.end_time }}"

                  - alias: "Set limit"
                    action: number.set_value
                    target:
                      entity_id: number.enphase_new_schedule_limit
                    data:
                      value: "{{ repeat.item.desired.limit }}"

                  - alias: "Disable all weekday switches"
                    action: homeassistant.turn_off
                    target:
                      entity_id:
                        - switch.enphase_new_schedule_mon
                        - switch.enphase_new_schedule_tue
                        - switch.enphase_new_schedule_wed
                        - switch.enphase_new_schedule_thu
                        - switch.enphase_new_schedule_fri
                        - switch.enphase_new_schedule_sat
                        - switch.enphase_new_schedule_sun

                  - alias: "Enable selected weekday"
                    action: homeassistant.turn_on
                    target:
                      entity_id: >
                        {% set day_entities = {
                          0: 'switch.enphase_new_schedule_mon',
                          1: 'switch.enphase_new_schedule_tue',
                          2: 'switch.enphase_new_schedule_wed',
                          3: 'switch.enphase_new_schedule_thu',
                          4: 'switch.enphase_new_schedule_fri',
                          5: 'switch.enphase_new_schedule_sat',
                          6: 'switch.enphase_new_schedule_sun'
                        } %}
                        {{ [day_entities[repeat.item.desired.day - 1]] }}

                  - delay: "00:00:02"

                  - alias: "Add the schedule"
                    action: button.press
                    target:
                      entity_id: button.new_schedule_add

                  - delay: "00:00:02"

    - alias: "Enable/disable CFG based on charge plan"
      if:
        - condition: template
          value_template: "{{ charge_exists }}"
      then:
        - alias: "Log CFG enable"
          action: system_log.write
          data:
            logger: PredbatControl
            level: info
            message: "Enabling CFG (charge from grid)"

        - alias: "Enable CFG mode"
          action: homeassistant.turn_on
          target:
            entity_id: switch.enphase_cfg_mode
      else:
        - alias: "Log CFG disable"
          action: system_log.write
          data:
            logger: PredbatControl
            level: info
            message: "Disabling CFG (no charge scheduled)"

        - alias: "Disable CFG mode"
          action: homeassistant.turn_off
          target:
            entity_id: switch.enphase_cfg_mode

    - alias: "Enable/disable DTG based on export plan"
      if:
        - condition: template
          value_template: "{{ discharge_exists }}"
      then:
        - alias: "Log DTG enable"
          action: system_log.write
          data:
            logger: PredbatControl
            level: info
            message: "Enabling DTG (discharge to grid)"

        - alias: "Enable DTG mode"
          action: homeassistant.turn_on
          target:
            entity_id: switch.enphase_dtg_mode
      else:
        - alias: "Log DTG disable"
          action: system_log.write
          data:
            logger: PredbatControl
            level: info
            message: "Disabling DTG (no export scheduled)"

        - alias: "Disable DTG mode"
          action: homeassistant.turn_off
          target:
            entity_id: switch.enphase_dtg_mode

    - alias: "Force cloud refresh"
      action: system_log.write
      data:
        logger: PredbatControl
        level: info
        message: "Forcing cloud refresh"

    - alias: "Press cloud refresh button"
      action: button.press
      target:
        entity_id: button.force_cloud_refresh

    - alias: "Log schedule update complete"
      action: system_log.write
      data:
        logger: PredbatControl
        level: info
        message: "Predbat complete - to_update:{{ mutation_plan.to_update | length }} to_add:{{ mutation_plan.to_add | length }} to_delete:{{ mutation_plan.to_delete | length }}"
