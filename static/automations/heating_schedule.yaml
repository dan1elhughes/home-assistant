- alias: "Heating schedule"
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.heating
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.heating
              state: "on"
            - condition: state
              entity_id: group.presence_home
              state: home
          sequence:
            - service: climate.set_temperature
              data:
                temperature: >
                  {{ states("input_number.thermostat_high") | float }}
              target:
                entity_id: climate.central_heating
        - conditions:
            - condition: state
              entity_id: binary_sensor.heating
              state: "off"
          sequence:
            - service: climate.set_temperature
              data:
                temperature: >
                  {{ states("input_number.thermostat_low") | float }}
              target:
                entity_id: climate.central_heating
