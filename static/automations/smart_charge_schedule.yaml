- alias: "Smart charge start"
  mode: single
  trigger:
    - platform: time
      at: input_datetime.smart_charge_start
  condition:
    - alias: "Auto enable smart charge enabled"
      condition: state
      entity_id: input_boolean.auto_enable_smart_charge
      state: "on"
  action:
    - alias: "Enable smart charge"
      action: switch.turn_on
      target:
        entity_id: switch.octopus_energy_00000000_0002_4000_8020_00000008191c_intelligent_smart_charge
    - alias: "Notify user"
      action: notify.dan
      data:
        message: "Smart charge enabled"
        data:
          notification_icon: "mdi:car-electric"
          channel: "smart_charge"
          tag: auto_enable_smart_charge

- alias: "Smart charge end"
  mode: single
  trigger:
    - platform: time
      at: input_datetime.smart_charge_end
  condition:
    - alias: "Auto enable smart charge enabled"
      condition: state
      entity_id: input_boolean.auto_enable_smart_charge
      state: "on"
  action:
    - alias: "Disable smart charge"
      action: switch.turn_off
      target:
        entity_id: switch.octopus_energy_00000000_0002_4000_8020_00000008191c_intelligent_smart_charge
    - alias: "Notify user"
      action: notify.dan
      data:
        message: "Smart charge disabled"
        data:
          notification_icon: "mdi:car-electric"
          channel: "smart_charge"
          tag: auto_enable_smart_charge
