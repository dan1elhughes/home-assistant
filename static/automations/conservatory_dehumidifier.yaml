- alias: Conservatory dehumidifier control
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak
              state: "on"
          sequence:
            - service: humidifier.set_humidity
              target:
                entity_id: humidifier.conservatory_dehumidifier
              data:
                # Set to the Off-Peak value
                humidity: "{{ states('input_number.dehumidifier_offpeak') | int }}"
      default:
        - service: humidifier.set_humidity
          target:
            entity_id: humidifier.conservatory_dehumidifier
          data:
            humidity: "{{ states('input_number.dehumidifier_peak') | int }}"

- alias: Conservatory dehumidifier monitoring
  trigger:
    - platform: state
      entity_id: binary_sensor.dehumidifier_sensor
  condition:
    - condition: template
      value_template: "{{ states('binary_sensor.dehumidifier_sensor') in ['on', 'off'] }}"
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.dehumidifier_sensor
              state: "on"
          sequence:
            - service: humidifier.turn_off
              target:
                entity_id: humidifier.conservatory_dehumidifier
            - service: notify.dan
              data:
                title: "Dehumidifier"
                message: "Sensor wet - empty tank"
                data:
                  channel: "dehumidifier"
                  notification_icon: "mdi:water-alert"
        - conditions:
            - condition: state
              entity_id: binary_sensor.dehumidifier_sensor
              state: "off"
          sequence:
            - service: humidifier.turn_on
              target:
                entity_id: humidifier.conservatory_dehumidifier
            - service: notify.dan
              data:
                title: "Dehumidifier"
                message: "Tank emptied - resuming"
                data:
                  channel: "dehumidifier"
                  notification_icon: "mdi:check-circle"
