- alias: Conservatory dehumidifier control
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.octopus_energy_electricity_15p0706167_2000050773706_off_peak
              state: "on"
          sequence:
            - service: humidifier.set_humidity
              target:
                entity_id: humidifier.conservatory_dehumidifier
              data:
                # Set to the Off-Peak value
                humidity: "{{ states('input_number.dehumidifier_offpeak') | int }}"
      default:
        - service: humidifier.set_humidity
          target:
            entity_id: humidifier.conservatory_dehumidifier
          data:
            humidity: "{{ states('input_number.dehumidifier_peak') | int }}"

- alias: Conservatory dehumidifier monitoring
  trigger:
    - platform: state
      entity_id: binary_sensor.dehumidifier_low_power_mode
      to: "on"
      for:
        minutes: 10
  action:
    - service: notify.dan
      data:
        title: "Dehumidifier tank full"
        message: >
          Tank needs emptying. 
          Power: {{ states('sensor.dehumidifier_energy_power') }}W (compressor not running).
          Humidity: {{ states('sensor.conservatory_sensor_humidity') }}%
        data:
          channel: "dehumidifier"
          notification_icon: "mdi:water-alert"
