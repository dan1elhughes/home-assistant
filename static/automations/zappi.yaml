- alias: "Zappi control"
  mode: single
  trigger:
    - platform: state
      entity_id:
        - select.myenergi_zappi_charge_mode
        - switch.smart_charge
        - input_boolean.auto_enable_smart_charge
  action:
    - choose:
        - alias: "Smart Charge"
          conditions:
            - alias: "Octopus smart charge enabled"
              condition: state
              entity_id: switch.smart_charge
              state: "on"
          sequence:
            - alias: "Set Zappi to Fast"
              action: select.select_option
              target:
                entity_id: select.myenergi_zappi_charge_mode
              data:
                option: "Fast"
        - alias: "Smart charge tonight - stop charger"
          conditions:
            - alias: "Smart charge tonight is enabled"
              condition: state
              entity_id: input_boolean.auto_enable_smart_charge
              state: "on"
          sequence:
            - alias: "Set Zappi to Stopped"
              action: select.select_option
              target:
                entity_id: select.myenergi_zappi_charge_mode
              data:
                option: "Stopped"
      default:
        - alias: "Set Zappi to Stopped"
          action: select.select_option
          target:
            entity_id: select.myenergi_zappi_charge_mode
          data:
            option: "Stopped"

- alias: "Notify Dan when Zappi plug state changes"
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.myenergi_zappi_plug_status
  action:
    - action: notify.mobile_app_pixel_9
      data:
        title: "Zappi"
        message: "{{ states('sensor.myenergi_zappi_plug_status') }} at {{ now().strftime('%H:%M') }}"
        data:
          tag: "zappi-plug-status"

- alias: "Disable smart charge on disconnect"
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.myenergi_zappi_plug_status
      to: "EV Disconnected"
  condition:
    - alias: "Smart charge currently on"
      condition: state
      entity_id: switch.smart_charge
      state: "on"
  action:
    - alias: "Disable smart charge"
      action: switch.turn_off
      target:
        entity_id: switch.smart_charge
    - alias: "Stop scheduled start re-enabling it"
      action: input_boolean.turn_off
      target:
        entity_id: input_boolean.auto_enable_smart_charge
    - alias: "Stop scheduled end disabling it"
      action: input_boolean.turn_off
      target:
        entity_id: input_boolean.auto_disable_smart_charge
    - alias: "Notify Dan"
      action: notify.dan
      data:
        title: "Smart charge"
        message: "Auto-disabled: EV disconnected"
        data:
          notification_icon: "mdi:car-electric"
          channel: "smart_charge"
          tag: "smart_charge_disconnected"
