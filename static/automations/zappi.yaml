- alias: "Zappi control"
  mode: single
  trigger:
    - platform: state
      entity_id:
        - sensor.predbat_intent
        - select.myenergi_zappi_charge_mode
        - switch.octopus_energy_00000000_0002_4000_8020_00000008191c_intelligent_smart_charge
        - input_boolean.auto_enable_smart_charge
  action:
    - choose:
        - alias: "Smart Charge"
          conditions:
            - alias: "Octopus smart charge enabled"
              condition: state
              entity_id: switch.octopus_energy_00000000_0002_4000_8020_00000008191c_intelligent_smart_charge
              state: "on"
          sequence:
            - alias: "Set Zappi to Fast"
              action: select.select_option
              target:
                entity_id: select.myenergi_zappi_charge_mode
              data:
                option: "Fast"
        - alias: "Smart charge tonight - stop charger"
          conditions:
            - alias: "Smart charge tonight is enabled"
              condition: state
              entity_id: input_boolean.auto_enable_smart_charge
              state: "on"
          sequence:
            - alias: "Set Zappi to Stopped"
              action: select.select_option
              target:
                entity_id: select.myenergi_zappi_charge_mode
              data:
                option: "Stopped"
        - alias: "Charge"
          conditions:
            - alias: "Predbat is charging or holding battery charge"
              condition: template
              value_template: "{{ states('sensor.predbat_intent') is match('^(Chrg|HoldChrg)') }}"
            - alias: "Zappi currently stopped"
              condition: state
              entity_id: select.myenergi_zappi_charge_mode
              state: "Stopped"
            - alias: "Smart charge tonight is not enabled"
              condition: state
              entity_id: input_boolean.auto_enable_smart_charge
              state: "off"
          sequence:
            - alias: "Set Zappi to Fast"
              action: select.select_option
              target:
                entity_id: select.myenergi_zappi_charge_mode
              data:
                option: "Fast"
        - alias: "Stop"
          conditions:
            - alias: "Predbat is not charging or holding battery charge"
              condition: template
              value_template: "{{ states('sensor.predbat_intent') is not match('^(Chrg|HoldChrg|FrzChrg)') }}"
            - alias: "Zappi currently fast"
              condition: state
              entity_id: select.myenergi_zappi_charge_mode
              state: "Fast"
          sequence:
            - alias: "Set Zappi to Stopped"
              action: select.select_option
              target:
                entity_id: select.myenergi_zappi_charge_mode
              data:
                option: "Stopped"

- alias: "Notify Dan when Zappi plug state changes"
  mode: single
  trigger:
    - platform: state
      entity_id: sensor.myenergi_zappi_plug_status
  action:
    - action: notify.mobile_app_pixel_9
      data:
        title: "Zappi"
        message: "{{ states('sensor.myenergi_zappi_plug_status') }} at {{ now().strftime('%H:%M') }}"
        data:
          tag: "zappi-plug-status"
