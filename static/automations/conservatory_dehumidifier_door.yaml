- alias: Conservatory dehumidifier door
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.conservatory_door_opening
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.conservatory_door_opening
              state: "on"
          sequence:
            - action: humidifier.turn_off
              target:
                entity_id: humidifier.dehumidifier
      default:
        - action: humidifier.turn_on
          target:
            entity_id: humidifier.dehumidifier
        - action: automation.trigger
          target:
            entity_id: automation.conservatory_dehumidifier_control
