- alias: Wake up lights (Katie)
  mode: single
  trigger:
    - platform: time
      at: input_datetime.wake_up_katie
  condition:
    - alias: "Home"
      condition: state
      entity_id: person.katie
      state: home
    - alias: "Enabled"
      condition: state
      entity_id: input_boolean.wake_up_katie_enabled
      state: "on"
  action:
    - alias: "Turn on lamp"
      service: light.turn_on
      target:
        entity_id: light.bedroom_lamp_left
      data:
        brightness: 125

- alias: Wake up lights (Dan)
  mode: single
  trigger:
    - platform: time
      at: input_datetime.wake_up_dan
  condition:
    - alias: "Home"
      condition: state
      entity_id: person.dan
      state: home
    - alias: "Enabled"
      condition: state
      entity_id: input_boolean.wake_up_dan_enabled
      state: "on"
  action:
    - alias: "Set active room"
      service: input_select.select_option
      data:
        entity_id: input_select.active_room
        option: bedroom
    - alias: "Fully open curtains"
      service: v6_quietdrift.set_switchbot_curtain_position
      data:
        position: 100
        entity_id: cover.curtains
        speed: 1
